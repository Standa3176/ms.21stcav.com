parameters:
  paths:
    - ./app
  exclude_files:
    - '#.*test.*#'
  layers:
    - name: Products
      collectors:
        - type: directory
          regex: app/Domain/Products/.*
    - name: Pricing
      collectors:
        - type: directory
          regex: app/Domain/Pricing/.*
    - name: Competitor
      collectors:
        - type: directory
          regex: app/Domain/Competitor/.*
    - name: Sync
      collectors:
        - type: directory
          regex: app/Domain/Sync/.*
    - name: Webhooks
      collectors:
        - type: directory
          regex: app/Domain/Webhooks/.*
    - name: CRM
      collectors:
        - type: directory
          regex: app/Domain/CRM/.*
    - name: Suggestions
      collectors:
        - type: directory
          regex: app/Domain/Suggestions/.*
    - name: Alerting
      collectors:
        - type: directory
          regex: app/Domain/Alerting/.*
    - name: Feeds
      collectors:
        - type: directory
          regex: app/Domain/Feeds/.*
    # Phase 6 Plan 01 — ProductAutoCreate domain (models + services + policies
    # + future jobs/listeners/appliers in Plans 06-02..06-06).
    - name: ProductAutoCreate
      collectors:
        - type: directory
          regex: app/Domain/ProductAutoCreate/.*
    # Phase 7 Plan 02 — Dashboard domain (SnapshotAggregator + widgets).
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    - name: Dashboard
      collectors:
        - type: directory
          regex: app/Domain/Dashboard/.*
    # Phase 7 Plan 05 — Cutover domain (6 artisan commands + 7 services for the
    # v1 legacy-plugin → Laravel migration: snapshot-woo-db / divergence-scan /
    # populate-overrides / drill-rollback / disable-legacy-plugins / checklist).
    # One-way arrow: other layers MUST NOT depend on Cutover. DeptracCutoverLayerTest
    # (Plan 07-06) enforces this with positive + 2 negative it-blocks + dual-file grep.
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    - name: Cutover
      collectors:
        - type: directory
          regex: app/Domain/Cutover/.*
    # Phase 8 Plan 01 — C4 Agent Framework (greenfield agents domain).
    # Allow-list per AGNT-10: read-only consumption of v1 data domains
    # (Foundation, Suggestions, Products, Pricing, Competitor, CRM,
    # ProductAutoCreate). DENIES Webhooks, Sync, Cutover, Marketing.
    # AgentsWriteOnlyViaSuggestionsTest enforces zero direct DB writes
    # outside Models/AgentRun.php — agents must produce data exclusively
    # through the Suggestions seam (AgentSuggestionWriter — Plan 03).
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    - name: Agents
      collectors:
        - type: directory
          regex: app/Domain/Agents/.*
    # Phase 9 Plan 01 — E1 Trade Customer Pricing decorator domain (TRDE-01).
    # Allow-list locked at [Foundation, Pricing, Products]: TradeRuleResolver
    # decorates v1 Pricing\RuleResolver, reads Products for brand/category,
    # and threads Foundation primitives (DomainEvent, Auditor, Context).
    # DENIES Sync, CRM, Webhooks, Cutover, Marketing, Agents, Channels,
    # Quotes — TradePricing must never reach into write-side or unrelated
    # v2 layers. DeptracTradePricingLayerTest enforces dual-YAML lockstep.
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    - name: TradePricing
      collectors:
        - type: directory
          regex: app/Domain/TradePricing/.*
    - name: Foundation
      collectors:
        - type: directory
          regex: app/Foundation/.*
    - name: Http
      collectors:
        - type: directory
          regex: app/Http/.*
    # SYNC-04 — Plan 02-05 — ban direct DB facade use from Sync domain (WP direct-DB-write prohibition).
    # Sync must write to Woo via REST only (WooClient); the local mirror goes via Eloquent models.
    # Any `DB::` facade use in app/Domain/Sync/* trips the `-WpDirectDb` deny rule below.
    - name: WpDirectDb
      collectors:
        - type: classLike
          regex: '^Illuminate\\Support\\Facades\\DB$'
  ruleset:
    # Phase 6 Plan 04 extension (Rule 3 — blocking): Products allow-list
    # extended with ProductAutoCreate because ProductResource ships a
    # 'Field Pins' tab (AUTO-10, AUTO-11 D-10) that delegates pin read/write
    # to App\Domain\ProductAutoCreate\Services\FieldPinManager. Service-layer
    # indirection means Products does NOT import ProductOverride directly.
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    Products:     [Foundation, ProductAutoCreate]
    # Phase 3 (Plans 03-01..03-05): Pricing layer cross-domain allow-list.
    #   - Foundation: DomainEvent, Auditor, IntegrationLogger, BaseCommand (all Pricing services extend these)
    #   - Products: Product + ProductVariant (RuleResolver + PriceRecomputer read buy_price / brand_id / category_id)
    #   - Sync: SupplierPriceChanged event + ImportIssue model (listener subscribes; PriceRecomputer writes missing_cost_price rows)
    #   - WpDirectDb: SimulatedImpactCalculator uses DB::beginTransaction + rollBack as the PRCE-09 dry-run transactional boundary (narrowly scoped, SYNC-04 ban still applies to Sync layer)
    # Explicitly NOT allowed: CRM, Competitor, Webhooks, Feeds, Alerting, Suggestions.
    # (Phase 5 will add Competitor → Pricing for the suggestions producer — NOT the reverse.)
    # Plan 03-05 deviation (Rule 3): WpDirectDb retained in the allow-list — the plan's literal ruleset `[Foundation, Products, Sync]` would break Plan 03-03's SimulatedImpactCalculator (6 Deptrac violations). Architectural intent preserved: Pricing never imports CRM/Competitor/Webhooks/Feeds/Alerting/Suggestions.
    # Phase 9 Plan 01 deviation (Rule 3 — blocking): Pricing allow-list extended
    # with TradePricing because PricingRule (v1 model) gains a customerGroup()
    # BelongsTo App\Domain\TradePricing\Models\CustomerGroup relation as part of
    # the additive customer_group_id column edit (TRDE-01). One-way arrow:
    # TradePricing already depends on Pricing via the decorator (TradeRuleResolver
    # delegates to RuleResolver) — adding TradePricing to Pricing's allow-list
    # closes the BelongsTo loop without introducing a circular reference because
    # the dependency lives entirely on the model-relation surface, not service
    # logic. Architectural intent preserved: Pricing service classes (RuleResolver,
    # PriceCalculator, PriceRecomputer, SimulatedImpactCalculator) remain
    # ignorant of customer groups — only the model-relation arrow crosses.
    Pricing:      [Foundation, Products, Sync, WpDirectDb, TradePricing]
    # Phase 5 Plan 02 — Competitor layer cross-domain allow-list.
    # Plan 05-03 extends: + Webhooks (IncrementSkuSalesCount listener subscribes to
    # OrderReceived event + loads WebhookReceipt to read raw_body.line_items).
    # Plan 05-04b adds Alerting for CompetitorCheckStaleCommand → StaleFeedNotification
    # routing to AlertRecipient (receives_competitor_alerts scope). Mirrors the
    # Phase 4 CRM → Alerting DLQ pattern. Explicitly authorized by the 05-04b plan's
    # key_links block (CompetitorCheckStaleCommand → AlertRecipient).
    #   - Foundation: DomainEvent, BaseCommand, Context (every service extends)
    #   - Pricing: PriceCalculator::stripVat (COMP-06) — single source of VAT math.
    #     Plan 05-03: + PricingRule model + PricingRuleChanged event (MarginChangeApplier).
    #   - Products: Product model read (SKU match for orphan detection, D-08 + sales counter)
    #   - Suggestions: NewProductOpportunityApplier + MarginChangeApplier (Plan 05-03)
    #   - Webhooks: OrderReceived event + WebhookReceipt (Plan 05-03 IncrementSkuSalesCount)
    #   - Alerting: AlertRecipient lookup for stale-feed notification (Plan 05-04b COMP-11).
    # Explicitly NOT allowed: CRM, Sync (write path), Feeds.
    Competitor:   [Foundation, Pricing, Products, Suggestions, Webhooks, Alerting]
    Sync:         [Foundation, Products, Alerting, '-WpDirectDb']  # Plan 02-03: SyncChunkJob mirrors supplier state into Product/ProductVariant. Plan 02-04: SyncSupplierCommand reads AlertRecipient for D-08. Plan 02-05: -WpDirectDb denies direct DB facade use (SYNC-04).
    Webhooks:     [Foundation]
    # Phase 4 (Plans 04-02..04-05): CRM layer cross-domain allow-list.
    #   - Foundation: IntegrationLogger, Auditor, DomainEvent, BaseCommand, Context (every CRM service extends these)
    #   - Sync: SyncDiff model reused for CRM_WRITE_ENABLED=false shadow mode (Option A from RESEARCH.md)
    #   - Alerting: AlertRecipient lookup for DLQ alert distribution on exhausted retries (Plan 04-03)
    #   - Webhooks: subscribes to OrderReceived + CustomerRegistered events (Plan 04-03)
    #   - Suggestions: CrmPushRetryApplier producer for kind='crm_push_failed' (Plan 04-03)
    # Explicitly NOT allowed: Pricing, Products, Competitor, Feeds.
    # Phase 8 Plan 05 (D-09) — CRM extended with Agents allow-list because
    # GdprEraseBitrixCustomerCommand now injects AgentRunGdprScrubber via
    # constructor (extension via DI; v1 logic shape preserved).
    CRM:          [Foundation, Sync, Alerting, Webhooks, Suggestions, Agents]
    Suggestions:  [Foundation]
    Alerting:     [Foundation]
    Feeds:        [Foundation]
    # Phase 6 Plan 03 — ProductAutoCreate layer cross-domain allow-list.
    #   - Foundation: DomainEvent base, IntegrationLogger, BaseCommand, Context
    #   - Products: Product model + ProductVariant (orchestrator reads/writes)
    #   - Pricing: RuleResolver + PriceCalculator + ProductOverride (pin enforcement
    #     uses ProductOverride; initial price uses Phase 3 pricing engine)
    #   - Sync: WooClient + SupplierClient + NewSupplierSkuDetected +
    #     SupplierPriceChanged/SupplierStockChanged/SupplierSkuMissing events
    #     (Plan 05 pin-enforcement listener subscribes to these)
    #   - Suggestions: SuggestionApplier contract + Suggestion model (applier
    #     producers + CreateWooProductJob::failed() DLQ writes)
    #   - Alerting: AlertRecipient (receives_auto_create_alerts scope)
    #   - Webhooks: forward-compat for Plan 05+ pin-enforcement / audit hooks
    # Explicitly NOT allowed: CRM, Competitor, Feeds. NewProductOpportunityApplier
    # MOVED to ProductAutoCreate in Plan 06-03 (RESEARCH Q4 option b) so
    # Competitor is no longer in the allow-list — one-way arrow preserved.
    ProductAutoCreate: [Foundation, Products, Pricing, Sync, Suggestions, Alerting, Webhooks]
    # Phase 7 Plan 02 — Dashboard aggregates metrics from every prior domain
    # (one-way arrow: other domains MUST NOT depend on Dashboard).
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    Dashboard:    [Foundation, Products, Pricing, Sync, Suggestions, Alerting, Webhooks, Competitor, CRM, ProductAutoCreate, WpDirectDb]
    # Phase 7 Plan 05/06 — Cutover orchestrates the v1 legacy-plugin migration.
    # The 6 commands + 7 services read every prior domain (divergence scan walks
    # Products; populate-overrides writes ProductOverride; drill-rollback reads
    # WOO_WRITE_ENABLED flag from Foundation; disable-legacy-plugins uses WooClient;
    # checklist aggregates gates from every phase). Same one-way-arrow contract
    # as Dashboard: no other layer has Cutover in its allow-list.
    # WpDirectDb is IN the allow-list but narrowly scoped: OverridePopulator uses
    # DB::transaction() around the local meetingstore_ops DB writes to keep the
    # per-product override upsert atomic. This is the same pattern as Pricing
    # (SimulatedImpactCalculator in Plan 03-03). LegacyPluginDisabler is
    # separately static-scan-tested (Plan 07-05 Test DL4) to contain zero DB::
    # facade references — the WpDirectDb ban on WORDPRESS writes is preserved.
    # Feeds is explicitly EXCLUDED — Feeds is the forward-compat v2 channel-feed
    # domain; no Cutover command reads Feeds scope.
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    Cutover:      [Foundation, Products, Pricing, Sync, Suggestions, Alerting, Webhooks, Competitor, CRM, ProductAutoCreate, Dashboard, WpDirectDb]
    # Phase 8 Plan 01 — Agents layer cross-domain allow-list (AGNT-10).
    #   - Foundation: DomainEvent, BaseCommand, Auditor, IntegrationLogger
    #     (every agent service extends or threads these)
    #   - Suggestions: SuggestionApplier contract + Suggestion model — agents
    #     produce ONLY through this seam (AgentsWriteOnlyViaSuggestionsTest
    #     enforces). Plan 03's AgentSuggestionWriter is the sole non-AgentRun
    #     write path.
    #   - Products / Pricing / Competitor / CRM / ProductAutoCreate: read-only
    #     consumption for tool implementations (Plan 03+04 read_*/search_*
    #     tools). Agents never UPDATE these tables; the Suggestions seam is
    #     the only producer→consumer arrow.
    # Explicitly NOT allowed: Webhooks, Sync, Cutover, Feeds, Dashboard,
    # Marketing (v2.1). DeptracAgentsLayerTest enforces these denials.
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    # Phase 8 Plan 05 — Alerting added because Plan 05 Task 4 (BLOCKER 2)
    # AlertRecipient lookups in NotifyOn{AgentRunFailed,MonthlyBudgetExceeded,
    # GuardrailBlocked} listeners. WpDirectDb added because the
    # AgentRunGdprScrubber writes a gdpr_erasure_log audit row via DB facade
    # (mirrors Phase 4 GdprEraser pattern + Pricing SimulatedImpactCalculator
    # precedent — narrowly scoped to local meetingstore_ops DB writes; WP
    # writes remain banned).
    Agents:       [Foundation, Suggestions, Products, Pricing, Competitor, CRM, ProductAutoCreate, Alerting, WpDirectDb]
    # Phase 9 Plan 01 — TradePricing layer cross-domain allow-list (TRDE-01).
    #   - Foundation: DomainEvent base, Auditor, IntegrationLogger, BaseCommand, Context
    #     (TradeRuleResolver + UpdateCustomerGroupOnUserRoleChange listener thread these)
    #   - Pricing: RuleResolver delegated to (decorator); PricingRule model read for
    #     customer-group-scoped rule queries; PriceCalculator unchanged (consumed by
    #     downstream callers — Phase 11 Quote flow — not by TradePricing itself)
    #   - Products: Product model read for brand_id / category_id during 5-tier
    #     specificity sort (Plan 09-02 TradeRuleResolver query path)
    #   - Webhooks: Plan 09-04 deviation (Rule 3 — blocking). The
    #     UpdateCustomerGroupOnUserRoleChange listener subscribes to
    #     Webhooks\Events\CustomerRegistered and reads Webhooks\Models\WebhookReceipt
    #     to extract Woo role from the raw_body payload. ONE-WAY ARROW: Webhooks
    #     does NOT depend on TradePricing. Same listener-based extension precedent
    #     as Phase 6 ProductAutoCreate subscribing to v1 events. Architectural
    #     intent preserved: TradeRuleResolver service class remains ignorant of
    #     Webhooks — only the listener crosses the boundary.
    # Explicitly NOT allowed: Sync, CRM, Cutover, Marketing, Agents,
    # Channels, Quotes — DeptracTradePricingLayerTest enforces these denials.
    # MIRRORS deptrac.yaml — dual-config-sync (Phase 5 Plan 05-05 lesson).
    TradePricing: [Foundation, Pricing, Products, Webhooks]
    Foundation:   []
    # Phase 8 Plan 01 — Http allow-list extended with Agents so Plan 04's
    # future Filament AgentRunResource (under app/Filament if added) and
    # Plan 04's RunAgentJob dispatcher (controller wiring) can reach into
    # the Agents domain. The arrow stays one-way: Agents itself does NOT
    # have Http in its allow-list.
    Http:         [Foundation, Products, Pricing, Competitor, Sync, Webhooks, CRM, Suggestions, Alerting, Feeds, ProductAutoCreate, Dashboard, Cutover, Agents, TradePricing]

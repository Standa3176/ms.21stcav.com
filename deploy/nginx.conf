# nginx vhosts for ms.21stcav.com  — CWP / CloudLinux box (shared with rams.21stcav.com)
#
# IMPORTANT: this server runs CentOS Web Panel (CWP) on CloudLinux. Do NOT use
# `certbot --nginx` and do NOT rely on CWP AutoSSL for this site:
#   * CWP only regenerates vhosts under /etc/nginx/conf.d/vhosts/. The two files
#     below live directly in /etc/nginx/conf.d/ so they survive CWP rebuilds and
#     take precedence over the (shadowed) CWP-generated ms.21stcav.com vhosts.
#   * PHP is served by the per-user CloudLinux php-fpm pool socket, which runs as
#     user `stcav` — that is what makes storage/ writes work. The shared `www`
#     pool on 127.0.0.1:9000 runs as `nginx` and CANNOT write storage/ (500s).
#
# Deploy as TWO files:
#   /etc/nginx/conf.d/ms.21stcav.com.conf      -> :80  (redirect + ACME)
#   /etc/nginx/conf.d/ms.21stcav.com.ssl.conf  -> :443 (the app)
#   nginx -t && systemctl reload nginx
#
# Prereqs (one-time):
#   * nginx user must be in group `nobody` to open the per-user fpm socket
#       usermod -aG nobody nginx && systemctl restart nginx
#   * cert via webroot (auto-renews; do NOT use --nginx):
#       certbot certonly --webroot -w /home/stcav/ms.21stcav.com/public \
#         -d ms.21stcav.com --agree-tos -m webmaster@21stcav.com \
#         --deploy-hook "systemctl reload nginx"
#   * if stcav's PHP version changes in the CloudLinux selector, update the
#     fastcgi_pass socket path below (php-fpm83 -> php-fpmXX).

# ── :80 — redirect everything to HTTPS, but keep the ACME path live ─────────
server {
    listen 46.202.141.242:80;
    server_name ms.21stcav.com;
    root /home/stcav/ms.21stcav.com/public;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── :443 — the Laravel app, via the per-user `stcav` php-fpm socket ─────────
server {
    listen 46.202.141.242:443 ssl;
    server_name ms.21stcav.com;
    root /home/stcav/ms.21stcav.com/public;
    index index.php;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/ms.21stcav.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ms.21stcav.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 60m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / { try_files $uri $uri/ /index.php?$query_string; }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Block dotfiles (.env, .git, …) but never the ACME challenge.
    location ~ /\.(?!well-known).* { deny all; access_log off; log_not_found off; }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/opt/alt/php-fpm83/usr/var/sockets/stcav.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;          # tell Laravel the request is secure
        fastcgi_param SERVER_PORT 443;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Static assets: cache real files, but fall through to PHP for dynamic
    # routes that happen to end in an asset extension (e.g.
    # /livewire/livewire.js). Using `=404` here breaks Livewire/Filament JS.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    client_max_body_size 50M;
    access_log /var/log/nginx/ms.21stcav.com.ssl.access.log;
    error_log  /var/log/nginx/ms.21stcav.com.ssl.error.log;
}

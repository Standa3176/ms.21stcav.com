# nginx vhost for ms.21stcav.com
# Place at: /etc/nginx/conf.d/ms.21stcav.com.conf
# Test with: nginx -t && systemctl reload nginx
#
# certbot will rewrite this file to add the SSL listener after you run:
#   certbot --nginx -d ms.21stcav.com

server {
    listen 80;
    listen [::]:80;
    server_name ms.21stcav.com;

    root /home/stcav/ms.21stcav.com/public;
    index index.php;

    charset utf-8;

    # Laravel rewrite — front-controller pattern.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Block access to .env, .git, etc.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.php$ {
        # Adjust this socket path to match RAMS's vhost (your existing
        # /etc/nginx/conf.d/rams.21stcav.com.conf is the canonical reference).
        # Common values:
        #   /run/php-fpm/www.sock           (RHEL/AlmaLinux 8/9)
        #   /var/run/php/php8.3-fpm.sock    (Debian/Ubuntu)
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Static assets — long cache + sendfile-friendly.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # File upload limit — competitor CSVs can be large; supplier feeds
    # via FTP land in storage/, not via HTTP, so this is just for the
    # admin UI's bulk-CSV-import use case (if/when it exists).
    client_max_body_size 50M;

    access_log /var/log/nginx/ms.21stcav.com.access.log;
    error_log  /var/log/nginx/ms.21stcav.com.error.log;
}

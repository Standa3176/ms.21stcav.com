# Phase 8 Plan 02 (AGNT-08) — self-hosted Langfuse stack for v2.0 agent observability.
#
# Six containers run on the SAME VPS as ops.meetingstore.co.uk; ALL host port
# bindings are pinned to 127.0.0.1 so the only public ingress is via nginx
# reverse proxy at lf.ops.meetingstore.co.uk with admin HTTP basic auth.
# See docs/ops/observability.md for bootstrap, retention, backup, and the
# custom-OTel fallback runbook.
#
# Bring-up:    docker compose -f docker-compose.langfuse.yml --env-file .env.langfuse up -d
# Tail logs:   docker compose -f docker-compose.langfuse.yml logs -f langfuse-web langfuse-worker
# Tear down:   docker compose -f docker-compose.langfuse.yml down       (volumes preserved)
# Wipe data:   docker compose -f docker-compose.langfuse.yml down -v    (DESTRUCTIVE — see runbook)

name: meetingstore-ops-langfuse

services:
  # ────────────────────────────────────────────────────────────────────
  # Langfuse Web — UI + ingest API. Reverse-proxied at lf.ops.meetingstore.co.uk.
  # ────────────────────────────────────────────────────────────────────
  langfuse-web:
    image: langfuse/langfuse:3
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment: &langfuse-env
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_AUTH}
      # Disable open signup AFTER bootstrap (T-08-02-04 EoP mitigation):
      # set AUTH_DISABLE_SIGNUP=true once the first admin user is created via UI.
      AUTH_DISABLE_SIGNUP: ${AUTH_DISABLE_SIGNUP:-false}
      # ── S3-compatible blob storage (MinIO) for events / media / batch exports ──
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "true"
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse
      LANGFUSE_S3_BATCH_EXPORT_REGION: auto
      LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://minio:9000
      LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: minio
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: "true"
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # Langfuse Worker — async trace ingestion + batch export.
  # ────────────────────────────────────────────────────────────────────
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3030:3030"
    environment: *langfuse-env
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # ClickHouse — column store for trace events. Disk-heavy; main retention target.
  # ────────────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -nv -t1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      retries: 5
      timeout: 5s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # Postgres — Langfuse metadata + auth (organisations, projects, API keys).
  # ────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      retries: 10
      timeout: 5s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # Redis 7 — Langfuse internal queue + cache. Auth-required.
  # ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_AUTH}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_AUTH} ping || exit 1"]
      interval: 5s
      retries: 10
      timeout: 5s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # MinIO — S3-compatible blob storage for event uploads / media / batch exports.
  # Console exposed locally on 9091 for ops debugging only.
  # ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      timeout: 5s
    restart: unless-stopped

volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_redis_data:
  langfuse_minio_data:

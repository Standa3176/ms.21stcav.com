services:
  mysql:
    image: mysql:8.4
    container_name: meetingstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: meetingstore_ops
      MYSQL_USER: meetingstore
      MYSQL_PASSWORD: meetingstore
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.2-alpine
    container_name: meetingstore-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - "everysec"
      - --maxmemory-policy
      - "noeviction"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  mysql_data:
  redis_data:
